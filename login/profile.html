<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Sen:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="/images/LogoFahasi.png"
      type="image/x-icon"
    />
    <title>Thông tin người dùng</title>
    <style>
      /*Phần header*/
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      img {
        max-width: 100%;
        height: auto;
      }
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
      }
      .header.fixed {
        position: sticky;
        top: -16px;
      }
      .logo {
        flex-shrink: 0;
      }
      .logo img {
        height: 70px;
      }
      .gio_hang {
        padding: 20px;
        flex-shrink: 0;
      }
      .gio_hang a {
        position: relative;
      }
      .gio_hang img {
        width: 48px;
        padding: 10px;
        cursor: pointer;
      }
      .icon-pink {
  filter: invert(48%) sepia(79%) saturate(2476%) hue-rotate(300deg)
    brightness(118%) contrast(119%);
  background-color: rgba(255, 192, 203, 0.3); /* Thêm nền hồng nhạt phía sau */
  border-radius: 50%;
}
      header {
        z-index: 100;
      }
      .container {
        background-color: rgb(248, 247, 226);
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        flex-wrap: wrap;
      }
      .nav {
        display: flex;
        justify-content: space-between;
      }
      .nav a {
        text-decoration: none;
        padding: 15px;
        font-size: 20px;
        font-weight: 500;
        color: black;
      }
      .nav a:hover {
        text-shadow: 1px 0;
        transition: 0.5s ease;
      }
      .nav-mobile-btn,
      .nav-input {
        display: none;
      }

      .nav-mobile-btn,
      .nav-input {
        display: none;
      }
      /*main*/
      .profile-container {
        width: 55%;
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        padding: 40px;
        margin: 0 auto;
        box-sizing: border-box;
      }

      .profile-title {
        text-align: center;
        font-size: 26px;
        font-weight: 600;
        color: #b22222;
      }
      .profile-image {
        width: 100%;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 2em;
      }
      .profile-image img {
        width: 25%;
        object-fit: cover;
        border-radius: 50%;
        display: block;
        margin: 0 auto;
        border: 4px solid #000000;
      }

      .info-group {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid #eee;
      }

      .info-label {
        font-weight: 500;
        color: #666;
        width: 40%;
      }

      .info-value {
        width: 60%;
        text-align: left;
        color: #222;
      }

      .action-section {
        margin-top: 30px;
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: center;
      }

      .btn {
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.3s;
      }

      .btn-primary {
        background: #3b6fe6;
        color: white;
      }

      .btn-secondary {
        background: orange;
        color: white;
      }

      .btn:hover {
        opacity: 0.75;
        transform: translateY(-5px);
        box-shadow: 0 5px 10px rgb(0, 0, 5);
      }
      .btn-edit {
        background: #4caf50;
        color: white;
      }
      /*footer*/
      footer {
        background-color: antiquewhite;
      }
      .footer {
        background: rgb(191, 216, 144);
        color: rgb(0, 0, 0);
        text-align: center;
        padding: 10px 0;
        width: 100%;
      }

      .footer-lienhe {
        justify-content: space-between;
        display: flex;
        text-align: center;
        padding-left: 20px;
        padding-right: 20px;
        padding-top: 10px;
        padding-bottom: 20px;
        gap: 15px;
      }

      .footer-lienhe img {
        width: 30px;
        margin-left: 10px;
        padding: 5px;
      }

      .popup-button {
        position: fixed;
        bottom: 130px;
        right: 20px;
      }

      .popup-button img {
        width: 50px;
        background-color: #ffffff;
        padding: 10px;
        border-radius: 80%;
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
      }
      .contact {
        text-align: center;
        padding-bottom: 24px;
      }

      /*media*/
      @media (max-width: 768px) {
        .profile-container {
          width: 95%;
        }

        .info-group {
          flex-direction: column;
          gap: 5px;
        }

        .info-label,
        .info-value {
          width: 100%;
        }
        .header .container {
          flex-wrap: wrap;
          position: relative;
        }
        .nav-mobile-btn {
          display: inline-block;
          cursor: pointer;
          padding: 5px;

          order: 0;
          margin-right: auto;
        }
        .nav {
          display: none;
          width: 100%;
          flex-direction: column;
          text-align: center;
          background-color: rgb(246, 243, 195);
          border-top: 1px solid #eee;
          padding-top: 10px;
          order: 3;
          animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
          from {
            opacity: 0;
            transform: translateY(-10px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        .nav-input:checked ~ .nav {
          display: flex;
        }
        .nav a {
          display: block;
          padding: 15px;
          border-bottom: 1px solid #f1f1f1;
        }
        .logo {
          order: 0;
        }
        .gio_hang {
          order: 0;
          margin-left: auto;
        }

        .footer-lienhe {
          flex-direction: column;
          align-items: center;
          gap: 30px;
        }

        .footer-lienhe > div {
          display: flex;
          flex-direction: column;
          align-items: center;
        }
      }
    </style>
  </head>
  <body>
    <header class="header fixed">
      <div class="container">
        <div class="logo">
          <a href="/trangchu.html"
            ><img src="/images/LogoFahasi.png" alt="Logo fahasi"
          /></a>
        </div>
        <input type="checkbox" id="nav-mobile-input" class="nav-input" hidden />

        <label for="nav-mobile-input" class="nav-mobile-btn"> &#9776; </label>
        <nav class="nav">
          <a href="/trangchu.html">TRANG CHỦ</a>
          <a href="/gioithieu/gioithieu.html">GIỚI THIỆU</a>
          <a href="/sanpham/sanpham.html">SẢN PHẨM</a>
          <a href="/login/login.html">ĐĂNG NHẬP</a>
          <a href="/register/register.html">ĐĂNG KÍ</a>
        </nav>

        <div class="gio_hang">
          <a href="/giohang/giohang.html"
            ><img src="/images/icon-class-gio-hang.png" alt="" />
            <span id="cart-count">0</span>
          </a>
          <img src="/images/icon-class-gio-hang2.png" alt="" />
        </div>
      </div>
    </header>
    <main>
      <div class="profile-container">
        <div class="profile-title">Thông Tin Người Dùng</div>
        <div class="profile-image">
          <img src="/images/profile-image.png" alt="ảnh" />
        </div>

        <div class="info-group">
          <div class="info-label">Họ tên:</div>
          <div class="info-value" id="hoten_"></div>
        </div>

        <div class="info-group">
          <div class="info-label">Giới tính:</div>
          <div class="info-value" id="gender_"></div>
        </div>

        <div class="info-group">
          <div class="info-label">Ngày tháng năm sinh:</div>
          <div class="info-value" id="ngaysinh_"></div>
        </div>

        <div class="info-group">
          <div class="info-label">SĐT:</div>
          <div class="info-value" id="sdt_"></div>
        </div>

        <div class="info-group">
          <div class="info-label">Email:</div>
          <div class="info-value" id="email_"></div>
        </div>

        <div class="info-group">
          <div class="info-label">Địa chỉ:</div>
          <div class="info-value" id="diachi_"></div>
        </div>
        <div class="action-section">
          <button class="btn btn-edit" id="submit__change-info">
            Sửa thông tin
          </button>
          <button class="btn btn-primary" id="submit__change-pass">
            Đổi mật khẩu
          </button>
          <button class="btn btn-secondary" id="submit__logout">
            Đăng xuất
          </button>
        </div>
      </div>
    </main>
    <footer>
      <div class="footer-container">
        <div class="footer-lienhe">
          <div>
            <img
              src="/images/icon/telephone.png"
              alt="Biểu tượng điện thoại liên hệ"
            />
            <p>0703 546 770</p>
          </div>
          <div>
            <img src="/images/icon/location.png" alt="Biểu tượng địa điểm" />
            <p>Đường 3/2, phường Ninh Kiều, TP. Cần Thơ</p>
          </div>
          <div>
            <img src="/images/icon/email.png" alt="Biểu tượng email" />
            <p>fahasistore@gmail.com</p>
          </div>
          <div>
            <img src="/images/icon/time.png" alt="Biểu tượng giờ làm việc" />
            <p>07:00 - 22:00 (Hàng ngày)</p>
          </div>
        </div>
        <div class="contact">
          <p>© 2026 Fahasi Store. All rights reserved.</p>
          <div class="social-icons">
            <a href="#" aria-label="Facebook"
              ><img src="/images/icon/facebook.png" alt="Facebook"
            /></a>
            <a href="#" aria-label="Instagram"
              ><img src="/images/icon/instagram.png" alt="Instagram"
            /></a>
            <a href="#" aria-label="TikTok"
              ><img src="/images/icon/tiktok.png" alt="TikTok"
            /></a>
            <a href="#" aria-label="Messenger"
              ><img src="/images/icon/messenger.png" alt="Messenger"
            /></a>
          </div>
        </div>
      </div>
    </footer>
    <!--JS-->
    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="/JS/Core/storage.js"></script>
    <script src="/JS/utils/validator.js"></script>
    <script src="/JS/Core/auth.js"></script>
    <script src="/JS/utils/format.js"></script>
    <script src="/JS/utils/check.js"></script>
    <script src="/JS/components/header.js"></script>
    <script src="/JS/Core/addCart.js"></script>

    <script src="/JS/page/profile.js"></script>
  </body>
</html>
