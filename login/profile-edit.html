<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thông Tin Người Dùng</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Sen:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="/images/LogoFahasi.png"
      type="image/x-icon"
    />
    <style>
      /*header*/
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      img {
        max-width: 100%;
        height: auto;
      }
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
      }
      .header.fixed {
        position: sticky;
        top: -16px;
      }
      .logo {
        flex-shrink: 0;
      }
      .logo img {
        height: 70px;
      }
      .gio_hang {
        padding: 20px;
        flex-shrink: 0;
      }
      .gio_hang img {
        width: 48px;
        padding: 10px;
        cursor: pointer;
      }
      header {
        z-index: 100;
      }
      .container {
        background-color: rgb(248, 247, 226);
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        flex-wrap: wrap;
      }
      .nav {
        display: flex;
        justify-content: space-between;
      }
      .nav a {
        text-decoration: none;
        padding: 15px;
        font-size: 20px;
        font-weight: 500;
        color: black;
      }
      .nav a:hover {
        text-shadow: 1px 0;
        transition: 0.5s ease;
      }
      .nav-mobile-btn,
      .nav-input {
        display: none;
      }
      .search-box {
        display: flex;
        align-items: center;
        border: 1px solid blue;
      }

      .search-box input {
        height: 50px;
        font-size: 18px;

        box-sizing: border-box;
        transition: all 0.6s ease-out;
      }

      .search-box input[type="text"] {
        width: 200px;
      }

      .search-box input[type="submit"] {
        width: 100px;
        cursor: pointer;
      }
      .search-box input[type="submit"]:hover {
        background-color: red;
      }
      .nav-mobile-btn,
      .nav-input {
        display: none;
      }
      /*main*/
      main {
        background: linear-gradient(to right, #f8f7e2, #ffffff);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .profile-card {
        width: 40%;
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      }

      .profile-title {
        text-align: center;
        margin-bottom: 30px;
        font-size: 26px;
        font-weight: 600;
        color: #b22222;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 14px;
        margin-bottom: 6px;
        color: #666;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      .row {
        display: flex;
        gap: 20px;
      }

      .row .form-group {
        flex: 1;
      }

      textarea {
        height: 80px;
      }

      .button-group {
        margin-top: 25px;
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: center;
      }

      .btn {
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.3s;
      }
      .btn-save {
        background: #4caf50;
        color: white;
      }

      .btn-save:hover {
        background: #388e3c;
      }
      /*footer*/
      footer {
        background-color: antiquewhite;
      }
      .footer {
        background: rgb(191, 216, 144);
        color: rgb(0, 0, 0);
        text-align: center;
        padding: 10px 0;
        width: 100%;
      }

      .footer-lienhe {
        justify-content: space-between;
        display: flex;
        text-align: center;
        padding-left: 20px;
        padding-right: 20px;
        padding-top: 10px;
        padding-bottom: 20px;
        gap: 15px;
      }
      .footer-lienhe img {
        width: 30px;
        margin-left: 10px;
        padding: 5px;
      }

      .popup-button {
        position: fixed;
        bottom: 130px;
        right: 20px;
      }

      .popup-button img {
        width: 50px;
        background-color: #ffffff;
        padding: 10px;
        border-radius: 80%;
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
      }
      .contact {
        text-align: center;
        padding-bottom: 24px;
      }
      /*media*/
      @media (max-width: 850px) {
        .profile-card {
          width: 95%;
        }
        .row {
          flex-direction: column;
        }
        .header .container {
          flex-wrap: wrap;
          position: relative;
        }
        .nav-mobile-btn {
          display: inline-block;
          cursor: pointer;
          padding: 5px;

          order: 0;
          margin-right: auto;
        }
        .nav {
          display: none;
          width: 100%;
          flex-direction: column;
          text-align: center;
          background-color: rgb(246, 243, 195);
          border-top: 1px solid #eee;
          padding-top: 10px;
          order: 3;
          animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
          from {
            opacity: 0;
            transform: translateY(-10px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        .nav-input:checked ~ .nav {
          display: flex;
        }
        .nav a {
          display: block;
          padding: 15px;
          border-bottom: 1px solid #f1f1f1;
        }
        .logo {
          order: 0;
        }
        .gio_hang {
          order: 0;
          margin-left: auto;
        }
        .search-box {
          width: 95%;
          margin: 10px auto;
          justify-content: center;
        }
        .search-box input[type="text"] {
          width: 70%;
        }

        .search-box input[type="submit"] {
          width: 30%;
        }
        /*Footer*/
        .footer-lienhe {
          flex-direction: column;
          align-items: center;
          gap: 30px;
        }

        .footer-lienhe > div {
          display: flex;
          flex-direction: column;
          align-items: center;
        }
      }
    </style>
  </head>
  <body>
    <header class="header fixed">
      <div class="container">
        <div class="logo">
          <a href="/trangchu.html"
            ><img src="/images/LogoFahasi.png" alt="Logo fahasi"
          /></a>
        </div>
        <input type="checkbox" id="nav-mobile-input" class="nav-input" hidden />

        <label for="nav-mobile-input" class="nav-mobile-btn"> &#9776; </label>
        <nav class="nav">
          <a href="/trangchu.html">TRANG CHỦ</a>
          <a href="/gioithieu/gioithieu.html">GIỚI THIỆU</a>
          <a href="/sanpham/sanpham.html">SẢN PHẨM</a>
          <a href="/login/login.html">ĐĂNG NHẬP</a>
          <a href="/register/register.html">ĐĂNG KÍ</a>
        </nav>
        <div class="search-box">
          <input type="text" placeholder="tên sách" />
          <input type="submit" value="Tìm kiếm" />
        </div>
        <div class="gio_hang">
          <a href="/giohang/giohang.html"
            ><img src="/images/icon-class-gio-hang.png" alt=""
          /></a>
          <img src="/images/icon-class-gio-hang2.png" alt="" />
        </div>
      </div>
    </header>
    <main>
      <div class="profile-card">
        <div class="profile-title">Thông Tin Cá Nhân</div>

        <form>
          <div class="row">
            <div class="form-group">
              <label>Họ tên</label>
              <input type="text" placeholder="Nhập họ và tên" id="hoten"/>
            </div>

            <div class="form-group">
              <label>Giới tính</label>
              <select id="gioitinh">
                <option>Nam</option>
                <option>Nữ</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Ngày tháng năm sinh</label>
            <input type="date"  id="ngaysinh"/>
          </div>

          <div class="form-group">
            <label>SĐT</label>
            <input type="tel" id="sdt" placeholder="Nhập số điện thoại" />
          </div>

          <div class="form-group">
            <label>Địa chỉ</label>
            <textarea id="diachi" placeholder="Nhập địa chỉ"></textarea>
          </div>

          <div class="button-group">
            <button type="submit" id="submit" class="btn btn-save">Lưu thông tin</button>
          </div>
        </form>
      </div>
    </main>
    <footer>
      <div class="footer-container">
        <div class="footer-lienhe">
          <div>
            <img
              src="/images/icon/telephone.png"
              alt="Biểu tượng điện thoại liên hệ"
            />
            <p>0703 546 770</p>
          </div>
          <div>
            <img src="/images/icon/location.png" alt="Biểu tượng địa điểm" />
            <p>Đường 3/2, phường Ninh Kiều, TP. Cần Thơ</p>
          </div>
          <div>
            <img src="/images/icon/email.png" alt="Biểu tượng email" />
            <p>fahasistore@gmail.com</p>
          </div>
          <div>
            <img src="/images/icon/time.png" alt="Biểu tượng giờ làm việc" />
            <p>07:00 - 22:00 (Hàng ngày)</p>
          </div>
        </div>
        <div class="contact">
          <p>© 2026 Fahasi Store. All rights reserved.</p>
          <div class="social-icons">
            <a href="#" aria-label="Facebook"
              ><img src="/images/icon/facebook.png" alt="Facebook"
            /></a>
            <a href="#" aria-label="Instagram"
              ><img src="/images/icon/instagram.png" alt="Instagram"
            /></a>
            <a href="#" aria-label="TikTok"
              ><img src="/images/icon/tiktok.png" alt="TikTok"
            /></a>
            <a href="#" aria-label="Messenger"
              ><img src="/images/icon/messenger.png" alt="Messenger"
            /></a>
          </div>
        </div>
      </div>
    </footer>

    <!--JS-->
    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="/JS/Core/storage.js"></script>
    <script src="/JS/utils/validator.js"></script>
    <script src="/JS/Core/auth.js"></script>

    <script src="/JS/page/profile-edit.js"></script>
  </body>
</html>
