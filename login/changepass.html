<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đổi mật khẩu</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/header-footer.css" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      .icon-pink {
        filter: invert(48%) sepia(79%) saturate(2476%) hue-rotate(300deg)
          brightness(118%) contrast(119%);
        background-color: rgba(
          255,
          192,
          203,
          0.3
        ); /* Thêm nền hồng nhạt phía sau */
        border-radius: 50%;
      }
      main {
        background: linear-gradient(to right, #f8f7e2, #ffffff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .change-pass-card {
        width: 35%;
        background: #fff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      .title {
        text-align: center;
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 25px;
        color: #b22222;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        color: #555;
      }

      input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      input:focus {
        outline: none;
        border-color: #3b6fe6;
      }

      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #3b6fe6;
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        background: #2c55c4;
      }

      .back {
        text-align: center;
        margin-top: 15px;
      }

      .back a {
        text-decoration: none;
        font-size: 14px;
        color: #555;
      }

      .back a:hover {
        color: #000;
      }
      @media screen and (max-width: 900px) {
        .change-pass-card {
          width: 50%;
        }
      }
      @media screen and (max-width: 500px) {
        .main {
          justify-content: flex-start;
        }
        .change-pass-card {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <header class="header fixed">
      <div class="container">
        <div class="logo">
          <a href="/trangchu.html">
            <img src="/images/LogoFahasi.png" alt="Logo fahasi" />
          </a>
        </div>
        <input type="checkbox" id="nav-mobile-input" class="nav-input" hidden />

        <label for="nav-mobile-input" class="nav-mobile-btn"> &#9776; </label>
        <nav class="nav">
          <a href="/trangchu.html">TRANG CHỦ</a>
          <a href="/gioithieu/gioithieu.html" class="active">GIỚI THIỆU</a>
          <a href="/sanpham/sanpham.html">SẢN PHẨM</a>
          <a href="/login/login.html">ĐĂNG NHẬP</a>
          <a href="/register/register.html">ĐĂNG KÍ</a>
        </nav>
        <div class="gio_hang">
          <a href="/giohang/giohang.html"
            ><img src="/images/icon-class-gio-hang.png" alt="" />
            <span id="cart-count">0</span>
          </a>
          <img src="/images/icon-class-gio-hang2.png" alt="" />
        </div>
      </div>
    </header>
    <main>
      <div class="change-pass-card">
        <div class="title">Đổi mật khẩu</div>

        <form onsubmit="return false;">
          <div class="form-group">
            <label>Mật khẩu hiện tại</label>
            <input
              type="password"
              id="oldPass"
              placeholder="Nhập mật khẩu cũ"
            />
          </div>

          <div class="form-group">
            <label>Mật khẩu mới</label>
            <input
              type="password"
              id="newPass"
              placeholder="Nhập mật khẩu mới"
            />
          </div>

          <div class="form-group">
            <label>Xác nhận mật khẩu</label>
            <input
              type="password"
              id="confirmPass"
              placeholder="Nhập lại mật khẩu"
            />
          </div>

          <button type="button" id="btnChange" class="btn">Đổi mật khẩu</button>
        </form>

        <div class="back">
          <a href="/login/profile.html">← Quay lại hồ sơ</a>
        </div>
      </div>
    </main>
    <footer>
      <div class="footer-container">
        <div class="footer-lienhe">
          <div>
            <img
              src="/images/icon/telephone.png"
              alt="Biểu tượng điện thoại liên hệ"
            />
            <p>0703 546 770</p>
          </div>
          <div>
            <img src="/images/icon/location.png" alt="Biểu tượng địa điểm" />
            <p>Đường 3/2, phường Ninh Kiều, TP. Cần Thơ</p>
          </div>
          <div>
            <img src="/images/icon/email.png" alt="Biểu tượng email" />
            <p>fahasistore@gmail.com</p>
          </div>
          <div>
            <img src="/images/icon/time.png" alt="Biểu tượng giờ làm việc" />
            <p>07:00 - 22:00 (Hàng ngày)</p>
          </div>
        </div>
        <div class="contact">
          <p>© 2026 Fahasi Store. All rights reserved.</p>
          <div class="social-icons">
            <a href="#" aria-label="Facebook"
              ><img src="/images/icon/facebook.png" alt="Facebook"
            /></a>
            <a href="#" aria-label="Instagram"
              ><img src="/images/icon/instagram.png" alt="Instagram"
            /></a>
            <a href="#" aria-label="TikTok"
              ><img src="/images/icon/tiktok.png" alt="TikTok"
            /></a>
            <a href="#" aria-label="Messenger"
              ><img src="/images/icon/messenger.png" alt="Messenger"
            /></a>
          </div>
        </div>
      </div>
    </footer>

    <!--JS-->
    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="/JS/Core/storage.js"></script>
    <script src="/JS/utils/validator.js"></script>
    <script src="/JS/Core/auth.js"></script>
    <script src="/JS/components/header.js"></script>
    <script src="/JS/Core/addCart.js"></script>

    <script src="/JS/page/changepass.js"></script>
  </body>
</html>
