<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="shortcut icon"
      href="/do_an-main/images/Fahasi_logo.jpg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="CSS/sanpham.css" />
    <title>Sản Phẩm</title>
  </head>
  <body>
    <div class="main-wrap">
      <header class="header fixed">
        <div class="container">
          <div class="logo">
            <a href="/trangchu.html"
              ><img src="images/Fahasi_logo.jpg" alt="Logo fahasi"
            /></a>
          </div>
          <nav class="nav">
            <a href="trangchu.html">TRANG CHỦ</a>
            <a href="gioithieu.html">GIỚI THIỆU</a>
            <a href="sanpham.html">SẢN PHẨM</a>
            <a href="login.html">ĐĂNG NHẬP</a>
            <a href="signup.html">ĐĂNG KÍ</a>
          </nav>
          <div class="search-container">
            <input
              type="text"
              class="search-input"
              placeholder="Tìm kiếm sách bạn yêu thích..."
            />
            <button class="search-button">
              <img src="images/icon/tl.webp" alt="" />
            </button>
          </div>
          <div class="gio_hang">
            <img src="images/icon-class-gio-hang.png" alt="" />
            <img src="images/icon-class-gio-hang2.png" alt="" />
          </div>
        </div>
      </header>

      <main id="main-content">
        <div id="product-list" class="product-grid"></div>

        <template id="product-template">
          <div class="product">
            <div class="imgproduct">
              <a href=""><img src="" alt="" /></a>
            </div>
            <div class="about-book">
              <h2 class="book-title"></h2>
              <p class="book-author"></p>
              <p>
                <strong class="old-price"></strong>
                <input class="sale" type="button" value="" />
                <br />
                <span class="current-price"></span>
              </p>
            </div>
            <input
              class="add_shopping"
              type="button"
              value="Thêm vào giỏ hàng"
            />
          </div>
        </template>
      </main>

      <footer>
        <div class="footer-container">
          <div class="footer-lienhe">
            <div>
              <img src="images/icon/telephone.png" alt="" />
              <p>0703 546 770</p>
            </div>
            <div>
              <img src="images/icon/location.png" alt="" />
              <p>Đường 3/2, Cần Thơ</p>
            </div>
            <div>
              <img src="images/icon/email.png" alt="" />
              <p>fahasistore@gmail.com</p>
            </div>
            <div>
              <img src="images/icon/time.png" alt="" />
              <p>07:00 - 22:00</p>
            </div>
          </div>
          <div class="contact">
            <p>© 2026 Fahasi Store. All rights reserved.</p>
            <div class="social-icons">
              <a href="#" aria-label="Facebook"
                ><img src="images/icon/facebook.png" alt="Facebook"
              /></a>
              <a href="#" aria-label="Instagram"
                ><img src="images/icon/instagram.png" alt="Instagram"
              /></a>
              <a href="#" aria-label="TikTok"
                ><img src="images/icon/tiktok.png" alt="TikTok"
              /></a>
              <a href="#" aria-label="Messenger"
                ><img src="images/icon/messenger.png" alt="Messenger"
              /></a>
            </div>
          </div>
        </div>
      </footer>
    </div>
    <script src="sanpham.js"></script>
  </body>
</html>
